<meta charset="UTF-8">

<title>المنصة الأكاديمية | Academia Hub</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   ACADEMIA HUB — DESIGN SYSTEM
   ============================================ */
:root{
  --primary:#1E3A5F; --primary-dark:#0f2040; --accent:#2A9D8F; --accent-dark:#21867a;
  --bg:#F8F9FA; --surface:#FFFFFF; --text:#1F2937; --muted:#6B7280; --border:#E5E7EB;
  --danger:#DC2626; --warning:#D97706; --success:#059669;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.05),0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.08);
  --radius:8px; --radius-lg:12px;
  --sidebar-w:260px; --header-h:64px; --bottom-nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:'IBM Plex Sans Arabic','Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;overscroll-behavior-y:none;
}
[dir="ltr"] body{font-family:'Inter','IBM Plex Sans Arabic',system-ui,sans-serif;}
[dir="rtl"] body{font-family:'IBM Plex Sans Arabic','Inter',system-ui,sans-serif;}
button,input,textarea,select{font-family:inherit;font-size:1rem;color:inherit}
a{text-decoration:none;color:inherit}
::placeholder{color:#9CA3AF}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* Typography */
h1,h2,h3,h4{font-weight:700;color:var(--primary);line-height:1.3;}
h1{font-size:1.75rem;}h2{font-size:1.4rem;}h3{font-size:1.15rem;}h4{font-size:1rem;}
.text-sm{font-size:.875rem;}.text-xs{font-size:.75rem;}.text-muted{color:var(--muted);}
.text-danger{color:var(--danger);}.text-success{color:var(--success);}.text-warning{color:var(--warning);}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1px solid transparent;padding:10px 18px;border-radius:var(--radius);
  font-weight:600;cursor:pointer;transition:background .2s,transform .1s;
  background:var(--surface);color:var(--text);border-color:var(--border);
}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-accent:hover{background:var(--accent-dark);}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn-ghost{background:transparent;}
.btn-sm{padding:6px 12px;font-size:.875rem;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* Forms */
.form-group{margin-bottom:16px;}
label{display:block;font-weight:600;margin-bottom:6px;color:var(--muted);font-size:.875rem;}
input,textarea,select{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);transition:border-color .2s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,58,95,.08);}
textarea{min-height:100px;resize:vertical;}
input[type="number"]{max-width:120px;}

/* Card, Table, Badge */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow);padding:24px;
}
.card-hover{transition:transform .2s,box-shadow .2s;cursor:pointer;}
.card-hover:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);}
table{width:100%;border-collapse:collapse;font-size:.875rem;}
th,td{padding:12px 16px;text-align:start;border-bottom:1px solid var(--border);white-space:nowrap;}
th{font-weight:700;color:var(--primary);background:#F1F5F9;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#F8FAFC;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.02em;}
.badge-navy{background:#E0E7F1;color:var(--primary);}.badge-teal{background:#D1FAE5;color:var(--accent-dark);}
.badge-amber{background:#FEF3C7;color:#92400E;}.badge-red{background:#FEE2E2;color:#991B1B;}
.badge-green{background:#D1FAE5;color:#065F46;}

/* Layout */
#app{min-height:100dvh;display:flex;flex-direction:column;}
.app-layout{display:flex;flex-direction:column;flex:1;}
.app-layout.is-auth{flex-direction:row;}
.main-wrapper{flex:1;display:flex;flex-direction:column;}
.main-content{padding:24px;max-width:1200px;margin:0 auto;width:100%;}
.desktop-only{display:none;}

/* Top bar */
.topbar{
  height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:40;
}
.topbar-logo{font-weight:800;color:var(--primary);font-size:1.25rem;display:flex;align-items:center;gap:8px;}
.topbar-actions{display:flex;align-items:center;gap:12px;}
.lang-toggle{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:6px 10px;font-weight:700;color:var(--primary);cursor:pointer;font-size:.875rem;
}
.notif-btn{position:relative;}
.notif-dot{
  position:absolute;top:2px;inset-inline-end:2px;background:var(--danger);color:#fff;
  font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;
}

/* Sidebar */
.sidebar{display:none;}
.sidebar-nav{list-style:none;padding:16px;}
.sidebar-nav li{margin-bottom:6px;}
.sidebar-nav a{
  display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius);
  color:var(--muted);font-weight:600;font-size:.875rem;transition:all .2s;
}
.sidebar-nav a:hover,.sidebar-nav a.active{background:#F1F5F9;color:var(--primary);}

/* Bottom nav */
.bottom-nav{
  height:var(--bottom-nav-h);background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;position:fixed;bottom:0;inset-inline:0;z-index:40;
}
.bottom-nav a{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px;
  color:var(--muted);font-size:.625rem;font-weight:600;
}
.bottom-nav a.active{color:var(--primary);}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;}
.tab-btn{
  padding:10px 16px;background:none;border:none;border-bottom:3px solid transparent;
  font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;
}
.tab-btn.active{color:var(--primary);border-color:var(--primary);}

/* Hero / Auth */
.hero{
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
  color:#fff;padding:80px 24px;text-align:center;
}
.hero h1{color:#fff;font-size:2.25rem;margin-bottom:12px;}
.hero p{opacity:.85;max-width:560px;margin:0 auto 24px;}
.auth-box{max-width:420px;margin:0 auto;background:rgba(255,255,255,.08);backdrop-filter:blur(8px);padding:32px;border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,.12);}
.auth-box input,.auth-box select,.auth-box textarea{color:var(--text);background:#fff;}
.auth-box label{color:rgba(255,255,255,.9);}
.auth-tabs{display:flex;gap:8px;margin-bottom:20px;justify-content:center;}
.auth-tab-btn{
  background:none;border:none;color:rgba(255,255,255,.7);font-weight:700;padding-bottom:6px;
  border-bottom:2px solid transparent;cursor:pointer;
}
.auth-tab-btn.active{color:#fff;border-color:#fff;}

/* Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.stat-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;}
.stat-value{font-size:1.75rem;font-weight:800;color:var(--primary);margin-top:4px;}

/* Course cards */
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
.course-cover{height:120px;border-radius:var(--radius) var(--radius) 0 0;}

/* Lists */
.list-item{
  display:flex;align-items:center;gap:16px;padding:16px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;transition:box-shadow .2s;
}
.list-item:hover{box-shadow:var(--shadow);}

/* Upload */
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--radius-lg);padding:32px;text-align:center;
  color:var(--muted);cursor:pointer;transition:border-color .2s,background .2s;
}
.upload-zone:hover{border-color:var(--accent);background:#F0FDFA;}
.upload-zone.locked{border-color:var(--danger);background:#FEF2F2;cursor:not-allowed;}

/* Countdown / Timer */
.countdown{font-variant-numeric:tabular-nums;font-weight:700;color:var(--primary);}

/* Exam screen */
.exam-screen{max-width:800px;margin:0 auto;padding:24px;}
.question-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
.q-nav-btn{
  width:40px;height:40px;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--surface);font-weight:700;cursor:pointer;
}
.q-nav-btn.answered{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Calendar */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;font-size:.875rem;}
.cal-day-head{padding:8px;font-weight:700;color:var(--muted);font-size:.75rem;text-transform:uppercase;}
.cal-day{padding:8px;border-radius:var(--radius);min-height:40px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.cal-day.other{color:var(--muted);opacity:.6;}
.cal-day.today{background:#F1F5F9;font-weight:700;}
.cal-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:2px;}

/* Notifications dropdown */
.notif-dropdown{
  position:absolute;top:var(--header-h);inset-inline-end:24px;width:340px;max-height:400px;overflow-y:auto;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);z-index:50;
}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.notif-item:hover{background:#F8FAFC;}
.notif-item.unread{border-inline-start:3px solid var(--accent);}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:50;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal-content{
  background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* Distraction-free exam */
.distraction-free .topbar,.distraction-free .sidebar,.distraction-free .bottom-nav{display:none!important;}
.distraction-free .main-wrapper{margin-inline-start:0!important;}

/* Toast */
.toast{
  position:fixed;bottom:24px;inset-inline-start:50%;transform:translateX(-50%);
  background:var(--primary);color:#fff;padding:12px 20px;border-radius:var(--radius);
  box-shadow:var(--shadow-lg);z-index:60;font-weight:600;display:none;
}

/* Responsive */
@media (min-width:1024px){
  .sidebar{display:flex;width:var(--sidebar-w);background:var(--surface);border-inline-end:1px solid var(--border);position:fixed;inset-block:var(--header-h) 0;inset-inline-start:0;z-index:30;overflow-y:auto;}
  .bottom-nav{display:none;}
  .main-wrapper{margin-inline-start:var(--sidebar-w);}
  .main-content{padding:32px;}
  .mobile-only{display:none!important;}
  .desktop-only{display:flex;}
}
@media (max-width:1023px){
 .main-content{padding:16px;padding-bottom:calc(16px + var(--bottom-nav-h));}
}
</style>

let appState = null;
function loadState(){
  try{
    const raw = localStorage.getItem('academia_data_v1');
    if(raw){appState=JSON.parse(raw);migrateState();return;}
  }catch(e){}
  seedData();
}
function migrateState(){
  let changed=false;
  ['contentModules','discussions','messages','attendance'].forEach(k=>{
    if(!appState[k]){appState[k]=[];changed=true;}
  });
  if(changed) saveState();
}
function saveState(){
  try{ localStorage.setItem('academia_data_v1',JSON.stringify(appState)); }
  catch(e){
    /* Quota exceeded: trim oldest notifications & messages, then retry */
    appState.notifications=appState.notifications.slice(-50);
    appState.messages=(appState.messages||[]).slice(-200);
    try{ localStorage.setItem('academia_data_v1',JSON.stringify(appState)); }
    catch(e2){ console.warn('localStorage full — state not persisted'); }
  }
}

/* Domain logic */
function getMyCourses(){
  if(!appState.currentUser) return [];
  if(appState.currentUser.role==='instructor') return appState.courses.filter(c=>c.instructorId===appState.currentUser.id);
  return appState.courses.filter(c=>c.studentIds.includes(appState.currentUser.id));
}
function getEffectiveDeadline(assignment,studentId){
  const per=assignment.extensions.perStudent.find(x=>x.studentId===studentId);
  if(per) return per.closeDate;
  if(assignment.extensions.globalCloseDate) return assignment.extensions.globalCloseDate;
  return assignment.closeDate;
}
function isLocked(assignment,studentId){
  return new Date() > new Date(getEffectiveDeadline(assignment,studentId));
}
function isExamAvailable(exam,studentId){
  const now=new Date(); const start=new Date(exam.availabilityStart); const end=new Date(exam.availabilityEnd);
  const per=exam.extensions.perStudent.find(x=>x.studentId===studentId);
  if(per && per.closeDate) return now>=start && now<=new Date(per.closeDate);
  if(exam.extensions.globalCloseDate) return now>=start && now<=new Date(exam.extensions.globalCloseDate);
  return now>=start && now<=end;
}
function canStartExam(exam,studentId){
  if(!isExamAvailable(exam,studentId)) return false;
  const att=getAttempt(exam.id,studentId); return !(att && att.isSubmitted);
}
function autoGradeQuestion(q,answer){
  if(!answer && answer!==false && answer!==0) return 0;
  if(q.type==='single') return answer===q.correctAnswer ? q.points : 0;
  if(q.type==='truefalse') return !!answer===q.correctAnswer ? q.points : 0;
  if(q.type==='short'){
    const a=answer.toString().trim().toLowerCase();
    const c=q.correctAnswer.toString().trim().toLowerCase();
    if(a===c) return q.points;
    if(q.tolerance==='low' && a.replace(/[^a-z0-9]/g,'')===c.replace(/[^a-z0-9]/g,'')) return q.points;
    return 0;
  }
  return 0;
}
function getRecentGrades(){
  if(!appState.currentUser || appState.currentUser.role!=='student') return [];
  return appState.submissions.filter(s=>s.studentId===appState.currentUser.id && s.grade!==null)
    .sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt)).slice(0,5)
    .map(s=>({title:getAssignment(s.assignmentId)?.title||'', grade:s.grade, max:getAssignment(s.assignmentId)?.maxGrade||0}));
}
function getPendingGradingCount(){
  if(!appState.currentUser || appState.currentUser.role!=='instructor') return 0;
  const myIds=getMyCourses().map(c=>c.id);
  let count=0;
  appState.assignments.filter(a=>myIds.includes(a.courseId)).forEach(a=>{
    const subs=appState.submissions.filter(s=>s.assignmentId===a.id && s.grade===null);
    count += new Set(subs.map(s=>s.studentId)).size;
  });
  return count;
}
function getDeadlines(){
  const uid=appState.currentUser?.id; if(!uid) return [];
  const list=[];
  appState.assignments.forEach(a=>{
    if(!getMyCourses().some(c=>c.id===a.courseId)) return;
    const dl=getEffectiveDeadline(a,uid); list.push({...a,deadline:dl,isOverdue:new Date()>new Date(dl)});
  });
  appState.exams.forEach(e=>{
    if(!getMyCourses().some(c=>c.id===e.courseId)) return;
    const dl=e.availabilityEnd;
    const per=e.extensions.perStudent.find(x=>x.studentId===uid);
    const final=per?per.closeDate:(e.extensions.globalCloseDate||dl);
    list.push({id:e.id,title:e.title,courseId:e.courseId,deadline:final,isOverdue:new Date()>new Date(final),isExam:true});
  });
  return list.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
}
function addNotification(userId,type,message){
  appState.notifications.push({id:genId(),userId,type,message,read:false,createdAt:nowIso()});
  if(appState.notifications.length>300) appState.notifications=appState.notifications.slice(-300);
  saveState();
}

function renderCalendar(){
  const today=new Date(); const year=today.getFullYear(); const month=today.getMonth();
  const first=new Date(year,month,1); const start=new Date(first); start.setDate(start.getDate()-((first.getDay()+6)%7));
  let html=`<div class="calendar">`;
  const days=lang==='ar'?['إث','ثل','أر','خم','جم','سب','أح']:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  days.forEach(d=>html+=`<div class="cal-day-head">${d}</div>`);
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const isToday=d.toDateString()===today.toDateString();
    const isOther=d.getMonth()!==month;
    const dots=getDeadlineDots(d);
    html+=`<div class="cal-day ${isToday?'today':''} ${isOther?'other':''}"><span>${d.getDate()}</span>${dots?`<div style="display:flex;gap:2px;">${Array(dots).fill('<span class="cal-dot"></span>').join('')}</div>`:''}</div>`;
  }
  return html+'</div>';
}
function getDeadlineDots(date){
  const ds=date.toDateString(); let c=0; const uid=appState.currentUser?.id; if(!uid) return 0;
  appState.assignments.forEach(a=>{
    if(!getMyCourses().some(x=>x.id===a.courseId)) return;
    if(new Date(getEffectiveDeadline(a,uid)).toDateString()===ds) c++;
  });
  appState.exams.forEach(e=>{
    if(!getMyCourses().some(x=>x.id===e.courseId)) return;
    if(new Date(e.availabilityEnd).toDateString()===ds) c++;
  });
  return Math.min(c,3);
}

    });
    const total=cells.filter(x=>x!=='-').reduce((a,b)=>a+(Number(b)||0),0);

    return {student:s,cells,total,maxTotal};
  });
  return `

function attachLandingEvents(){
  const form=document.getElementById('authForm'); if(!form) return;
  form.addEventListener('submit',e=>{
    e.preventDefault();
    if(currentView.name==='login'){
      const email=document.getElementById('inEmail').value.trim();
      const pass=document.getElementById('inPass').value;
      const user=appState.users.find(u=>u.email===email && u.password===pass);
      if(!user){showToast(lang==='ar'?'بيانات الدخول غير صحيحة':'Invalid credentials'); return;}
      appState.currentUser=user; saveState(); goTo('dashboard');
    } else {
      const role=document.getElementById('upRole').value;
      const name=document.getElementById('upName').value.trim();
      const email=document.getElementById('upEmail').value.trim();
      const sid=document.getElementById('upStudentId').value.trim();
      const pass=document.getElementById('upPass').value;
      if(appState.users.find(u=>u.email===email)){showToast('Email used');return;}
      const newUser={id:genId(),role,name,email,password:pass,studentId:role==='student'?sid:'',enrolledCourseIds:[],createdCourseIds:[]};
      appState.users.push(newUser); appState.currentUser=newUser; saveState(); goTo('dashboard');
    }
  });
}

function joinCourseByCode(){
  const code=document.getElementById('joinCodeInput')?.value.trim().toUpperCase();
  if(!code) return;
  const c=appState.courses.find(x=>x.joinCode===code);
  if(!c){showToast('Invalid code');return;}
  if(!c.studentIds.includes(appState.currentUser.id)){
    c.studentIds.push(appState.currentUser.id);
    appState.currentUser.enrolledCourseIds.push(c.id);
    saveState(); render();
  }
}

  const name=document.getElementById('cName').value.trim();

function handleFiles(input,aid){
  const a=getAssignment(aid); if(!a||!input.files.length) return;
  const files=Array.from(input.files).slice(0,5);
  const uid=appState.currentUser.id;
  const prev=getSubmissions(aid,uid);
  const version=(prev[0]?.version||0)+1;
  const isLate=new Date()>new Date(getEffectiveDeadline(a,uid));
  const fileObjs=files.map(f=>({name:f.name,type:f.type,size:f.size}));
  appState.submissions.push({id:genId(),assignmentId:aid,studentId:uid,files:fileObjs,textAnswer:'',submittedAt:nowIso(),version,grade:null,feedback:'',state:'submitted',isLate});
  saveState(); render(); showToast('Uploaded');
}
function saveGrade(subId){
  const gradeInput=document.querySelector(`.input-grade[data-sub="${subId}"]`);
  const fbInput=document.querySelector(`.input-feedback[data-sub="${subId}"]`);
  const sub=appState.submissions.find(s=>s.id===subId); if(!sub) return;
  const g=gradeInput?parseFloat(gradeInput.value):null;
  if(g!==null){sub.grade=g; sub.feedback=fbInput?fbInput.value:'';}
  addNotification(sub.studentId,'grade','Grade released'); saveState(); showToast('Saved'); render();
}
function extendGlobal(aid){
  const val=document.getElementById('extGlobal')?.value; if(!val) return;
  const a=getAssignment(aid); if(!a) return;
  a.extensions.globalCloseDate=new Date(val).toISOString();
  addNotification(appState.currentUser.id,'extension','Deadline extended'); saveState(); closeModal(); render();
}
function saveProfile(){
  const n=document.getElementById('setName')?.value.trim();
  const e=document.getElementById('setEmail')?.value.trim();
  const sid=document.getElementById('setStudentId')?.value.trim();
  if(n) appState.currentUser.name=n; if(e) appState.currentUser.email=e;
  if(appState.currentUser.role==='student' && sid!==undefined) appState.currentUser.studentId=sid;
  saveState(); showToast('Saved'); render();
}
function saveExamAnswer(eid,qid,val){
  const att=getAttempt(eid,appState.currentUser.id); if(!att) return;
  const idx=att.answers.findIndex(a=>a.questionId===qid);
  if(idx>-1) att.answers[idx].value=val;
  else att.answers.push({questionId:qid,value:val});
  saveState();
  const btns=document.querySelectorAll('.q-nav-btn');
  const qIndex=getExam(eid).questions.findIndex(q=>q.id===qid);
  if(btns[qIndex]) btns[qIndex].classList.add('answered');
  const ind=document.getElementById('autoSaveInd'); if(ind){ind.style.opacity=1; setTimeout(()=>ind.style.opacity=.6,800);}
}
function submitExam(eid){
  if(!confirm(t('areYouSure'))) return;
  const att=getAttempt(eid,appState.currentUser.id); if(!att) return;
  att.submittedAt=nowIso(); att.isSubmitted=true;
  const e=getExam(eid); let score=0;
  e.questions.forEach(q=>{
    const ans=att.answers.find(a=>a.questionId===q.id)?.value;
    if(q.type!=='essay') score+=autoGradeQuestion(q,ans);
    else att.isGraded=false;
  });
  att.score=score; att.isGraded=true;
  saveState(); goTo('examResults',{examId:eid});
}
function removeStudent(cid,sid){
  const c=getCourse(cid); if(!c) return;
  c.studentIds=c.studentIds.filter(id=>id!==sid);
  saveState(); render();
}
function copyJoinLink(code){
  navigator.clipboard.writeText(window.location.origin+'/#join/'+code).then(()=>showToast(t('copied')));
}
function exportGradebook(cid){
  const c=getCourse(cid);
  const students=c.studentIds.map(id=>getUser(id)).filter(Boolean);
  const assignments=appState.assignments.filter(a=>a.courseId===cid);
  const exams=appState.exams.filter(e=>e.courseId===cid);
  const assessments=[...assignments.map(a=>({id:a.id,type:'a',title:a.title,max:a.maxGrade})),...exams.map(e=>({id:e.id,type:'e',title:e.title,max:e.questions.reduce((s,q)=>s+q.points,0)}))];
  let csv="Name,"+assessments.map(a=>a.title).join(',')+",Total,Max\n";
  students.forEach(s=>{
    const cells=assessments.map(as=>{
      if(as.type==='a'){const sub=getSubmissions(as.id,s.id)[0]; return sub&&sub.grade!==null?sub.grade:'';}
      else{const att=getAttempt(as.id,s.id); return att&&att.isGraded?att.score:'';}
    });
    const total=cells.filter(x=>x!=='').reduce((a,b)=>a+(Number(b)||0),0);
    const maxTotal=assessments.reduce((s,a)=>s+a.max,0);
    csv+=`"${s.name}",${cells.join(',')},${total},${maxTotal}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='gradebook.csv'; a.click();
}
function postAnnouncement(cid){
  const el=document.getElementById('annText'); if(!el) return;
  const text=el.value.trim(); if(!text) return;
  const c=getCourse(cid); if(!c) return;
  c.announcements.unshift({id:genId(),courseId:cid,authorId:appState.currentUser.id,content:text,createdAt:nowIso(),comments:[]});
  c.studentIds.forEach(sid=>addNotification(sid,'assignment','New announcement in '+c.name));
  saveState(); render();
}

  a.comments.push({id:genId(),authorId:appState.currentUser.id,content:text,createdAt:nowIso()});

}

function ytEmbed(url){
  const m=(url||'').match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
  return m?`https://www.youtube.com/embed/${m[1]}`:null;
}
function renderContentItem(m,it,isInstr){
  const del=isInstr?`<button class="btn btn-sm btn-ghost" onclick="deleteContentItem('${m.id}','${it.id}')">${svgIcon('x',14)}</button>`:'';
  if(it.type==='video'){
    const emb=ytEmbed(it.url);
    return `<div style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="font-weight:700;display:flex;align-items:center;gap:6px;">${svgIcon('video',16)} ${it.title}</div>${del}</div>
      ${emb?`<div style="position:relative;padding-bottom:56.25%;height:0;border-radius:var(--radius);overflow:hidden;background:#000;"><iframe src="${emb}" style="position:absolute;inset:0;width:100%;height:100%;border:0;" allowfullscreen loading="lazy"></iframe></div>`:`<a href="${it.url}" target="_blank" rel="noopener" class="text-sm" style="color:var(--accent-dark);font-weight:600;">${it.url||''}</a>`}
    </div>`;
  }
  if(it.type==='link') return `<div class="list-item"><div style="display:flex;align-items:center;gap:8px;flex:1;">${svgIcon('link',16)} <a href="${it.url}" target="_blank" rel="noopener" style="font-weight:700;color:var(--accent-dark);">${it.title}</a></div>${del}</div>`;

}

/* ---------- Private Messages ---------- */
function getContacts(){
  const me=appState.currentUser; const map=new Map();
  getMyCourses().forEach(c=>{
    if(me.role==='student'){ const inst=getUser(c.instructorId); if(inst) map.set(inst.id,inst); }
    else { c.studentIds.forEach(sid=>{const s=getUser(sid); if(s) map.set(s.id,s);}); }
  });
  return [...map.values()];
}
function myMessagesWith(uid){
  const me=appState.currentUser.id;
  return appState.messages.filter(m=>(m.fromId===me&&m.toId===uid)||(m.fromId===uid&&m.toId===me)).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
}
function renderMessages(view){
  const contacts=getContacts();
  const active=view.userId?getUser(view.userId):null;
  if(active){
    const msgs=myMessagesWith(active.id);
    let marked=false;
    msgs.forEach(m=>{if(m.toId===appState.currentUser.id&&!m.read){m.read=true;marked=true;}});
    if(marked) saveState();
    setTimeout(()=>{const s=document.getElementById('msgScroll'); if(s) s.scrollTop=s.scrollHeight;},50);
    return `
      <div>
        <button class="btn btn-sm btn-ghost" onclick="goTo('messages')">${lang==='ar'?'← المحادثات':'← Conversations'}</button>

            ${msgs.length?msgs.map(m=>{
              const mine=m.fromId===appState.currentUser.id;
              return `<div style="align-self:${mine?'flex-end':'flex-start'};max-width:75%;background:${mine?'var(--primary)':'#F1F5F9'};color:${mine?'#fff':'var(--text)'};padding:10px 14px;border-radius:14px;">

                <div class="text-xs" style="opacity:.7;margin-top:2px;">${fmtDate(m.createdAt)}</div>

          </div>
          <div style="display:flex;gap:8px;">
            <input type="text" id="msgInput" placeholder="${t('typeMessage')}" style="flex:1;" onkeydown="if(event.key==='Enter')sendMessage('${active.id}')">

        </div>

  }
  return `

      <h2 style="margin-bottom:16px;">${t('messages')}</h2>
      ${contacts.length?contacts.map(u=>{
        const msgs=myMessagesWith(u.id); const last=msgs[msgs.length-1];
        const unread=msgs.filter(m=>m.toId===appState.currentUser.id&&!m.read).length;
        return `<div class="list-item card-hover" onclick="goTo('messages',{userId:'${u.id}'})">
          <div style="width:40px;height:40px;border-radius:50%;background:#E0E7F1;color:var(--primary);display:flex;align-items:center;justify-content:center;">${svgIcon('user',18)}</div>

          ${unread?`<span class="badge badge-red">${unread}</span>`:''}
        </div>`;
      }).join(''):`<div class="text-muted">${t('noData')}</div>`}

  appState.messages.push({id:genId(),fromId:appState.currentUser.id,toId,content:text,createdAt:nowIso(),read:false});

function renderAttendanceTab(c,isInstr){
  const sessions=appState.attendance.filter(a=>a.courseId===c.id).sort((a,b)=>b.date.localeCompare(a.date));
  if(!isInstr){
    const me=appState.currentUser.id;
    const mine=sessions.map(s=>({date:s.date,status:s.records[me]||'absent'}));
    const attended=mine.filter(x=>x.status==='present'||x.status==='late').length;
    const rate=mine.length?Math.round(attended/mine.length*100):100;
    return `
      <div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">${t('attendanceRate')}</div><div class="stat-value" style="color:${rate>=75?'var(--success)':'var(--danger)'};">${rate}%</div></div>
          <div class="stat-card"><div class="stat-label">${t('sessions')}</div><div class="stat-value">${mine.length}</div></div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>${t('attendanceDate')}</th><th>${t('state')}</th></tr></thead><tbody>
          ${mine.length?mine.map(x=>`<tr><td>${x.date}</td><td>${attBadge(x.status)}</td></tr>`).join(''):`<tr><td colspan="2" class="text-muted" style="text-align:center;">${t('emptyAttendance')}</td></tr>`}
        </tbody></table></div>
      </div>`;
  }
  const students=c.studentIds.map(id=>getUser(id)).filter(Boolean);
  const today=new Date().toISOString().slice(0,10);
  return `
    <div>
      <div class="card" style="margin-bottom:20px;">
        <h4 style="margin-bottom:12px;">${t('takeAttendance')}</h4>
        <div class="form-group"><label>${t('attendanceDate')}</label><input type="date" id="attDate" value="${today}" style="max-width:200px;"></div>
        <div class="table-wrap"><table><thead><tr><th>${t('name')}</th><th>${t('state')}</th></tr></thead><tbody>
          ${students.map(s=>`<tr><td style="font-weight:700;">${s.name}</td><td>
            <select class="att-select" data-sid="${s.id}" style="max-width:160px;padding:6px;">
              <option value="present">${t('present')}</option>
              <option value="absent">${t('absent')}</option>
              <option value="late">${t('late')}</option>
              <option value="excused">${t('excused')}</option>
            </select></td></tr>`).join('')}
        </tbody></table></div>
        <div style="margin-top:12px;"><button class="btn btn-primary" onclick="saveAttendance('${c.id}')">${t('saveAttendance')}</button></div>
      </div>
      <h4 style="margin-bottom:12px;">${t('sessions')}</h4>
      ${sessions.length?sessions.map(s=>`
        <div class="list-item">
          <div style="flex:1;font-weight:700;">${s.date}</div>
          <div class="text-sm text-muted">${Object.values(s.records).filter(v=>v==='present').length}/${c.studentIds.length} ${t('present')}</div>
        </div>`).join(''):`<div class="text-muted text-sm">${t('emptyAttendance')}</div>`}
    </div>`;
}
function saveAttendance(cid){
  const date=document.getElementById('attDate')?.value; if(!date){showToast('Required');return;}
  const records={};
  document.querySelectorAll('.att-select').forEach(sel=>records[sel.dataset.sid]=sel.value);
  const existing=appState.attendance.find(a=>a.courseId===cid&&a.date===date);
  if(existing) existing.records=records;
  else appState.attendance.push({id:genId(),courseId:cid,date,records});
  saveState(); showToast(t('save')); render();
}

/* ---------- Exam Question Builder ---------- */
function renderExamEdit(view){
  const e=getExam(view.examId); if(!e) return `<div>${t('noData')}</div>`;
  const c=getCourse(e.courseId);
  if(appState.currentUser.role!=='instructor'||c.instructorId!==appState.currentUser.id) return `<div>${t('noData')}</div>`;
  const total=e.questions.reduce((s,q)=>s+q.points,0);
  const typeLabel={single:t('typeSingle'),truefalse:t('typeTF'),short:t('typeShort'),essay:t('typeEssay')};
  return `
    <div>
      <button class="btn btn-sm btn-ghost" onclick="goTo('course',{courseId:'${c.id}',tab:'exams'})">${lang==='ar'?'← رجوع':'← Back'}</button>
      <div class="card" style="margin-top:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <div><h2>${e.title}</h2><div class="text-sm text-muted">${c.code} · ${e.questions.length} ${t('question')} · ${total} ${t('points')}</div></div>
          <button class="btn btn-primary" onclick="openAddQuestionModal('${e.id}')">${svgIcon('plus',18)} ${t('addQuestion')}</button>
        </div>
      </div>
      <div style="margin-top:16px;">
        ${e.questions.length?e.questions.map((q,i)=>`
          <div class="card" style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start;">
              <div style="flex:1;">
                <div style="font-weight:700;margin-bottom:6px;">${i+1}. ${q.text}</div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                  <span class="badge badge-navy">${typeLabel[q.type]||q.type}</span>
                  <span class="badge badge-teal">${q.points} ${t('points')}</span>
                </div>
                ${q.type==='single'?`<div class="text-sm" style="margin-top:8px;">${q.options.map(o=>`<div>${o.id===q.correctAnswer?'✅':'▫️'} ${o.text}</div>`).join('')}</div>`:''}
                ${q.type==='truefalse'?`<div class="text-sm text-muted" style="margin-top:8px;">${t('correctAnswer')}: ${q.correctAnswer?t('yes'):t('no')}</div>`:''}
                ${q.type==='short'?`<div class="text-sm text-muted" style="margin-top:8px;">${t('correctAnswer')}: ${q.correctAnswer}</div>`:''}
              </div>
              <button class="btn btn-sm btn-danger" onclick="deleteQuestion('${e.id}','${q.id}')">${svgIcon('trash',14)}</button>
            </div>
          </div>
        `).join(''):`<div class="text-muted" style="text-align:center;padding:40px;">${t('noQuestions')}</div>`}
      </div>
    </div>`;
}
function openAddQuestionModal(eid){
  openModal(`
    <div class="form-group"><label>${t('itemType')}</label><select id="qType" onchange="toggleQFields()">
      <option value="single">${t('typeSingle')}</option>
      <option value="truefalse">${t('typeTF')}</option>
      <option value="short">${t('typeShort')}</option>
      <option value="essay">${t('typeEssay')}</option>
    </select></div>
    <div class="form-group"><label>${t('questionText')}</label><textarea id="qText" rows="2"></textarea></div>
    <div class="form-group"><label>${t('points')}</label><input type="number" id="qPoints" value="1" min="0.5" step="0.5"></div>
    <div id="qSingleWrap">
      ${[1,2,3,4].map(n=>`<div class="form-group"><label>${t('option')} ${n}</label><input type="text" id="qOpt${n}"></div>`).join('')}
      <div class="form-group"><label>${t('correctAnswer')}</label><select id="qCorrectOpt">${[1,2,3,4].map(n=>`<option value="${n}">${t('option')} ${n}</option>`).join('')}</select></div>
    </div>
    <div id="qTFWrap" style="display:none;" class="form-group"><label>${t('correctAnswer')}</label><select id="qTF"><option value="true">${t('yes')}</option><option value="false">${t('no')}</option></select></div>
    <div id="qShortWrap" style="display:none;" class="form-group"><label>${t('correctAnswer')}</label><input type="text" id="qShort"></div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="addQuestion('${eid}')">${t('addQuestion')}</button></div>
  `);
}
function toggleQFields(){
  const v=document.getElementById('qType').value;
  document.getElementById('qSingleWrap').style.display=v==='single'?'block':'none';
  document.getElementById('qTFWrap').style.display=v==='truefalse'?'block':'none';
  document.getElementById('qShortWrap').style.display=v==='short'?'block':'none';
}
function addQuestion(eid){
  const e=getExam(eid); if(!e) return;
  const type=document.getElementById('qType').value;
  const text=document.getElementById('qText').value.trim();
  const points=parseFloat(document.getElementById('qPoints').value)||1;
  if(!text){showToast('Required');return;}
  const q={id:genId(),examId:eid,type,text,points};
  if(type==='single'){
    const opts=[];
    [1,2,3,4].forEach(n=>{const v=document.getElementById('qOpt'+n).value.trim(); if(v) opts.push({id:'o'+n,text:v});});
    if(opts.length<2){showToast(lang==='ar'?'أدخل خيارين على الأقل':'Enter at least 2 options');return;}
    q.options=opts;
    const sel='o'+document.getElementById('qCorrectOpt').value;
    if(!opts.some(o=>o.id===sel)){showToast(lang==='ar'?'الإجابة الصحيحة يجب أن تكون خياراً معبأً':'Correct answer must be a filled option');return;}
    q.correctAnswer=sel;
  }
  if(type==='truefalse') q.correctAnswer=document.getElementById('qTF').value==='true';
  if(type==='short'){
    const ca=document.getElementById('qShort').value.trim();
    if(!ca){showToast('Required');return;}
    q.correctAnswer=ca; q.tolerance='low';
  }
  e.questions.push(q);
  saveState(); modalHtml=''; goTo('examEdit',{examId:eid});
}
function deleteQuestion(eid,qid){
  if(!confirm(t('areYouSure'))) return;
  const e=getExam(eid); if(!e) return;
  e.questions=e.questions.filter(q=>q.id!==qid);
  saveState(); render();
}

/* ============================================
   SECTION 7: TIMERS
   ============================================ */
let countdownInterval;
function startCountdowns(){
  if(countdownInterval) clearInterval(countdownInterval);
  const tick=()=>{
    document.querySelectorAll('[data-countdown]').forEach(el=>{
      const target=new Date(el.dataset.countdown);
      const diff=target-new Date();
      if(diff<=0){el.textContent=t('overdue'); el.classList.add('text-danger'); return;}
      const h=Math.floor(diff/36e5), m=Math.floor((diff%36e5)/6e4), s=Math.floor((diff%6e4)/1000);
      el.textContent=`${h}h ${m}m ${s}s`;
    });
    const timerEl=document.getElementById('examTimer');
 if(timerEl && currentView.name==='examTake'){
      const e=getExam(currentView.examId);
      const att=getAttempt(e.id,appState.currentUser.id);
      if(att && !att.isSubmitted){
        const end=new Date(att.startedAt).getTime()+e.durationMinutes*60000;
        const left=end-Date.now();
        if(left<=0){timerEl.textContent='00:00'; submitExam(e.id);}
 else{const m=Math.floor(left/60000), s=Math.floor((left%60000)/1000); timerEl.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
      }
    }
  };
  tick(); countdownInterval=setInterval(tick,1000);
}

/* ============================================
   SECTION 8: INIT
   ============================================ */
loadState();
render();
</script>
